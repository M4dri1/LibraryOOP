version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./FRONTEND:/var/www/html/FRONTEND
      - ./API:/var/www/html/API
      - ./API/controllers:/var/www/html/API/controllers
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: mysql-container
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: library1
    ports:
      - "3306:3306"
    volumes:
      - ./API/db/data:/var/lib/mysql
    restart: always
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: 12345678
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
